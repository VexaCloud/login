<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Access Blocked</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
            background: #001f3f;
            color: #ffffff;
            font-family: Arial, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        #block-screen {
            text-align: center;
            max-width: 500px;
        }
        #block-screen h1 {
            font-size: 3rem;
            margin-bottom: 30px;
        }
        #block-screen p {
            font-size: 1.4rem;
            margin: 15px 0;
        }
        #block-screen a {
            color: #4da6ff;
            text-decoration: none;
        }
        #block-screen a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div id="block-screen">
        <h1>ACCESS BLOCKED</h1>
        <p>No user role found!</p>
    </div>
</body>
</html>
